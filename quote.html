<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Various quotes</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div id="bg"></div>
        <div id="main">
            <div id="carousel-selector">
                <p id="0" data-active="true">Altolympus</p>
                <p id="1" data-active="false">Miscellaneous</p>
            </div>

            <div class="carousel-container">
                <div class="carousel" id="altolympus" data-active="true"></div>
                <div class="carousel" id="misc" data-active="false"></div>
            </div>
        </div>
        <div id="zoom" style="display: none; scale: 1"></div>
        <div id="zoomout"></div>
        <script src="script.js"></script>
    </body>
</html>
